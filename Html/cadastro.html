<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet"
        href="../Css/login.css">

    <script
        src="https://kit.fontawesome.com/8d92fc562d.js"
        crossorigin="anonymous"></script>

</head>

<body>

    <header>

        <div class="logo">R</div>

        <h1 class="titulo">
            Raros.com
        </h1>

    </header>

    <div class="container">

        <h1>Cadastro</h1>

        <form id="formCadastro">

            <div class="input-grupo">

                <i class="fas fa-user"></i>

                <input
                    type="text"
                    id="nome"
                    placeholder="Nome"
                    required>

            </div>

            <div class="input-grupo">

                <i class="fas fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required>

            </div>

            <div class="input-grupo">

                <i class="fas fa-lock"></i>

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required>

            </div>

            <div class="input-grupo">

                <i class="fas fa-lock"></i>

                <input
                    type="password"
                    id="confirmarSenha"
                    placeholder="Confirmar senha"
                    required>

            </div>

            <button type="submit">

                <i class="fas fa-user-plus"></i>

                Cadastrar

            </button>

        </form>

        <div class="links-auxiliares">

            <a href="login.html">

                Já tenho conta

            </a>

        </div>

    </div>

    <script src="../JS/cadastro.js"></script>

</body>

</html>
